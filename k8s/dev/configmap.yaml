apiVersion: v1
kind: ConfigMap
metadata:
  name: retail-config
  namespace: retail-dev
data:
  # Stripe success/cancel redirects → Netlify frontend
  APP_FRONTEND_BASE_URL: "https://retail-novamart.netlify.app"
  APP_CORS_ALLOWED_ORIGINS: "https://retail-novamart.netlify.app"
  SPRING_DATA_REDIS_HOST: "retail-redis.retail-dev.svc.cluster.local"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_CACHE_TYPE: "redis"
  KAFKA_ENABLED: "false"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: ""
