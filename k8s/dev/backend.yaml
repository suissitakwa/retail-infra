apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-backend
  namespace: retail-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retail-backend
  template:
    metadata:
      labels:
        app: retail-backend
    spec:
      containers:
        - name: retail-backend
          image: suissitakwa/retail-backend:dev-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          env:
            # ── Database ──────────────────────────────────────────
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://retail-db.retail-dev.svc.cluster.local:5432/retail_db
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: retail-secrets
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: retail-secrets
                  key: DB_PASSWORD

            # ── Secrets ───────────────────────────────────────────
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: retail-secrets
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: retail-secrets
                  key: STRIPE_WEBHOOK_SECRET
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: retail-secrets
                  key: JWT_SECRET_KEY

            # ── Non-secret config (from ConfigMap) ─────────────────
            - name: APP_FRONTEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: retail-config
                  key: APP_FRONTEND_BASE_URL
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: retail-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: retail-config
                  key: SPRING_DATA_REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: retail-config
                  key: SPRING_DATA_REDIS_PORT
            - name: SPRING_CACHE_TYPE
              valueFrom:
                configMapKeyRef:
                  name: retail-config
                  key: SPRING_CACHE_TYPE
            - name: KAFKA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: retail-config
                  key: KAFKA_ENABLED
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: retail-config
                  key: SPRING_KAFKA_BOOTSTRAP_SERVERS

          # ── Health probes ──────────────────────────────────────
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12        # allows up to 2 min for slow startup
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 20
            failureThreshold: 3

          # ── Resource limits ────────────────────────────────────
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: retail-backend
  namespace: retail-dev
  annotations:
    cloud.google.com/neg: '{"ingress": true}'   # container-native load balancing
spec:
  selector:
    app: retail-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
